name: Farmshare
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  Farmshare:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Farmshare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.farmshare
        INFOPLIST_FILE: Farmshare/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Farmshare"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: Farmshare/Info.plist
      properties:
        CFBundleDisplayName: "Farmshare"
        ITSAppUsesNonExemptEncryption: false
  FarmshareTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FarmshareTests
    dependencies:
      - target: Farmshare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.farmshare.tests
  FarmshareUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FarmshareUITests
    dependencies:
      - target: Farmshare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.farmshare.uitests
schemes:
  Farmshare:
    build:
      targets:
        Farmshare: all
    test:
      targets:
        - FarmshareTests
        - FarmshareUITests
    run:
      config: Debug
